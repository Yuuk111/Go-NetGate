# Go-NetGate 配置文件

server:
  # 监听地址和端口
  port: "8443"

# 负载均衡配置
load_balance:
  # 后端服务器列表
  backends:
    - "http://localhost:9001"
    - "http://localhost:9002"
    - "http://localhost:9003"
  # 负载均衡算法（基础轮询-RR、IP哈希-IPHash）
  algorithm: "IPHash"

# 国密证书配置
gmtls:
  SignCertFile: "./certs/SS.crt"
  SignKeyFile: "./certs/SS.key"
  EncCertFile: "./certs/SE.crt"
  EncKeyFile: "./certs/SE.key"
