
services:
  redis:
    image: redis:7.0-alpine
    container_name: netgate-redis-docker
    ports:
      - "6381:6379"
    restart: always
  insight-agent:
    build: 
      context: ../Agent
    container_name: insight-agent
    expose:
      - "50051:50051"
      - "50052:50052"
    env_file:
      - .env
    restart: always
    
  netgate:
    build:
      context: .
    container_name: netgate
    ports:
      - "8443:8443"
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - ./certs:/app/certs:ro
      - ./config.yml:/app/config.yml:ro
    restart: always
    

